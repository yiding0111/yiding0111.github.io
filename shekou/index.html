<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海上世界文化艺术中心 · 白模研究动画</title>
<script>window.onerror = function (m, s, l, c) { window.__lastError = m + ' @' + (s || '').split('/').pop() + ':' + l + ':' + c; };</script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f5f5f1;
    font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif; }
  #app, #app canvas { position: fixed; inset: 0; display: block; }
  #vignette { position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 42%, rgba(0,0,0,0) 58%, rgba(40,40,36,0.10) 100%); }
  #fade { position: fixed; inset: 0; pointer-events: none; background: #f7f7f3; opacity: 0;
    transition: opacity 0.12s linear; }
  .ui { position: fixed; color: #3a3a36; z-index: 10; user-select: none; }
  #title { top: 28px; left: 32px; line-height: 1.5; }
  #title .cn { font-size: 19px; letter-spacing: 6px; font-weight: 600; }
  #title .en { font-size: 10.5px; letter-spacing: 2.6px; color: #8a8a84; margin-top: 5px; }
  #title .en b { color: #6fae3c; font-weight: 600; }
  #panel { top: 30px; right: 32px; text-align: right; }
  #btnPlay { font: 12px/1 inherit; letter-spacing: 2px; color: #3a3a36; background: rgba(255,255,255,0.72);
    border: 1px solid #c9c9c2; border-radius: 2px; padding: 8px 14px; cursor: pointer; }
  #btnPlay:hover { background: #fff; }
  #shotbar { bottom: 30px; right: 32px; text-align: right; }
  #shot { font-size: 12.5px; letter-spacing: 3px; color: #55554f; }
  #dots { margin-top: 9px; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #cfcfc7;
    margin-left: 8px; cursor: pointer; transition: background .3s, transform .3s; }
  .dot.on { background: #6fae3c; transform: scale(1.25); }
  #hint { bottom: 28px; left: 32px; font-size: 11px; letter-spacing: 2px; color: #a0a099;
    transition: opacity .5s; }
  #hint span { margin-right: 18px; }
  #lmbar { bottom: 74px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
  #lmcard { left: 32px; bottom: 120px; width: 264px; background: rgba(255,255,255,0.86);
    border: 1px solid #d2d2ca; border-radius: 3px; padding: 14px 16px 12px; line-height: 1.65;
    opacity: 0; transform: translateY(8px); transition: opacity .45s, transform .45s; pointer-events: none; }
  #lmcard.show { opacity: 1; transform: none; }
  #lmcard .t { font-size: 14.5px; font-weight: 600; letter-spacing: 2px; color: #33332f; }
  #lmcard .s { font-size: 10px; letter-spacing: 1.2px; color: #6fae3c; margin: 2px 0 6px; }
  #lmcard .d { font-size: 11.5px; color: #62625c; }
  #mmap { position: fixed; right: 32px; bottom: 96px; width: 150px; height: 150px; z-index: 10;
    border: 1px solid #cfcfc7; border-radius: 3px; background: #f0efe9; cursor: pointer;
    box-shadow: 0 1px 6px rgba(40,40,36,0.08); }
  #btnNight, #btnRec, #btnWx { font: 13px/1 inherit; color: #3a3a36; background: rgba(255,255,255,0.72);
    border: 1px solid #c9c9c2; border-radius: 2px; padding: 7px 11px; cursor: pointer; margin-left: 8px; }
  #btnNight:hover, #btnRec:hover, #btnWx:hover { background: #fff; }
  #btnWx.on { background: #6fae3c; border-color: #6fae3c; color: #fff; }
  #wxinfo { font-size: 10.5px; letter-spacing: 1.5px; color: #7c7c75; margin-top: 7px; text-align: right; }
  body.night #btnWx { background: rgba(30,38,50,0.8); color: #cfd8e2; border-color: #3d4856; }
  body.night #btnWx.on { background: #6fae3c; color: #fff; }
  body.night #wxinfo { color: #7f8b99; }
  @media (max-width: 700px) {
    #title .cn { font-size: 15px; letter-spacing: 3px; }
    #title .en { font-size: 8.5px; }
    #hint { display: none; }
    #mmap { width: 110px; height: 110px; bottom: 150px; }
    #lmcard { width: 210px; bottom: 128px; }
  }
  body.record { background: #0d0f12; }
  body.record .ui:not(#panel), body.record #mmap, body.record #vignette { display: none; }
  body.night #btnRec { background: rgba(30,38,50,0.8); color: #cfd8e2; border-color: #3d4856; }
  body.night { background: #151c26; }
  body.night #title .cn { color: #d5dde6; }
  body.night #title .en { color: #808d9c; }
  body.night #shot { color: #aeb9c6; }
  body.night #hint { color: #5f6a78; }
  body.night #btnPlay, body.night #btnNight { background: rgba(30,38,50,0.8); color: #cfd8e2; border-color: #3d4856; }
  body.night .lm { background: rgba(30,38,50,0.82); color: #b9c4d0; border-color: #3d4856; }
  body.night .lm.on { background: #6fae3c; border-color: #6fae3c; color: #fff; }
  body.night .dot { background: #46525f; }
  body.night .dot.on { background: #8cc63f; }
  body.night #lmcard { background: rgba(24,31,42,0.88); border-color: #3d4856; }
  body.night #lmcard .t { color: #dbe3ec; }
  body.night #lmcard .d { color: #93a0ae; }
  body.night #fade { background: #151c26; }
  body.night #mmap { border-color: #3d4856; }
  .lm { font: 12px/1 "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing: 1.5px; color: #4a4a44;
    background: rgba(255,255,255,0.78); border: 1px solid #c9c9c2; border-radius: 14px;
    padding: 8px 15px; cursor: pointer; transition: all .25s; white-space: nowrap; }
  .lm:hover { background: #fff; border-color: #9a9a92; }
  .lm.on { background: #6fae3c; border-color: #6fae3c; color: #fff; }
  @media (max-width: 900px) { #lmbar { flex-wrap: wrap; justify-content: center; max-width: 92vw; } }
</style>
</head>
<body>
<div id="app"></div>
<div id="vignette"></div>
<div id="fade"></div>
<div id="title" class="ui">
  <div class="cn">海上世界文化艺术中心</div>
  <div class="en">SEA WORLD CULTURE AND ARTS CENTER · SHEKOU SHENZHEN<br>MAKI AND ASSOCIATES · <b>WHITE MODEL STUDY</b></div>
</div>
<div id="panel" class="ui"><button id="btnPlay">⏸ 暂停巡游</button><button id="btnNight" title="昼夜切换">🌙</button><button id="btnWx" title="同步深圳实时天气（晴/阴/雨/昼夜）">🌦</button><button id="btnRec" title="1080p 出片：自动跑完一轮巡游并导出 webm 视频">🎬 出片</button><div id="wxinfo"></div></div>
<div id="shotbar" class="ui"><div id="shot"></div><div id="dots"></div></div>
<div id="lmbar" class="ui"></div>
<div id="lmcard" class="ui"><div class="t"></div><div class="s"></div><div class="d"></div></div>
<canvas id="mmap" width="150" height="150"></canvas>
<div id="hint" class="ui"><span>拖拽旋转 · 滚轮缩放（自动暂停巡游）</span><span>空格 播放/暂停</span><span>数字键 1–5 切换镜头</span></div>
<script src="three.min.js"></script>
<script src="BufferGeometryUtils.js"></script>
<script src="OrbitControls.js"></script>
<script src="pp_CopyShader.js"></script>
<script src="pp_EffectComposer.js"></script>
<script src="pp_ShaderPass.js"></script>
<script src="pp_RenderPass.js"></script>
<script src="pp_SimplexNoise.js"></script>
<script src="pp_SSAOShader.js"></script>
<script src="pp_SSAOPass.js"></script>
<script src="pp_FXAAShader.js"></script>
<script>document.write('<script src="osm_data.js?t=' + Date.now() + '"><\/script>');</script>
<script>document.write('<script src="app.js?t=' + Date.now() + '"><\/script>');</script>
</body>
</html>
